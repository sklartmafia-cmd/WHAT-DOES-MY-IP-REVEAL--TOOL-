<!DOCTYPE html>
<html>
<head>



  <title>IP Privacy Check</title>
<style>


  .topbar {
  display: flex;
  justify-content: space-between;
  align-items: center;
  padding: 16px 20px;
  border-bottom: 1px solid #1f2937;
  background: #0f172a;
}

.logo {
  font-weight: 600;
  text-decoration: none;
  color: #e5e7eb;
}

.nav-btn {
  padding: 8px 14px;
  background: #111827;
  border: 1px solid #374151;
  border-radius: 8px;
  text-decoration: none;
  color: #e5e7eb;
  font-size: 14px;
}

.nav-btn:hover {
  background: #1f2937;
}

  .data-row {
  display: flex;
  justify-content: space-between;
  padding: 6px 0;
  border-bottom: 1px solid #1f2937;
}
body {
  font-family: system-ui, -apple-system, Segoe UI, Roboto, Arial, sans-serif;
  background: radial-gradient(circle at top, #111827, #0b1220);
  color: #e5e7eb;
  margin: 0;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
}

  .card {
    width: 440px;
    background: rgba(17, 24, 39, 0.9);
    border: 1px solid #1f2937;
    border-radius: 16px;
    padding: 28px;
    box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    backdrop-filter: blur(10px);
  }

  h1 {
    font-size: 18px;
    margin-bottom: 18px;
    font-weight: 600;
    letter-spacing: 0.2px;
  }

  #output {
    font-size: 14px;
    line-height: 1.7;
  }

  hr {
    border: none;
    border-top: 1px solid #2a3441;
    margin: 18px 0;
  }

  .label {
    color: #93c5fd;
    font-weight: 600;
  }

  /* SCORE SECTION */
  .score-wrap {
    margin-top: 14px;
    padding: 14px;
    border-radius: 12px;
    background: #0f172a;
    border: 1px solid #1f2937;
  }

  .score-title {
    display: flex;
    justify-content: space-between;
    align-items: center;
  }

  .score-number {
    font-size: 22px;
    font-weight: 700;
  }

  .score-bar {
    height: 10px;
    background: #1f2937;
    border-radius: 999px;
    overflow: hidden;
    margin-top: 10px;
  }

  .score-fill {
    height: 100%;
    transition: width 0.5s ease;
  }

  .low { background: #ef4444; }
  .medium { background: #f59e0b; }
  .high { background: #22c55e; }

  .badge {
    display: inline-block;
    margin-top: 10px;
    padding: 5px 10px;
    border-radius: 999px;
    font-size: 12px;
    font-weight: 600;
  }

<ul class="small">
  <li>ISP exposure: Medium</li>
  <li>Location precision: City-level</li>
  <li>Network type: Residential</li>
</ul>

  .small {
    font-size: 12px;
    opacity: 0.7;
    margin-top: 12px;
  }

  /* subtle fade-in */
  #output {
    animation: fadeIn 0.4s ease;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(6px); }
    to { opacity: 1; transform: translateY(0); }
  }
</style>
  
</head>

<body>

<div class="topbar">
  <a href="/" class="logo">Free 1-page tools</a>
  <a href="/" class="nav-btn">View all tools</a>
</div>

<div class="card">
    <h1>What Does Your Internet Connection Reveal?</h1>

    <div id="output">Loading privacy data...</div>

    <hr>

    <div class="small">
      This tool shows approximate IP-based information only.
    </div>
  </div>

  <script src="script.js"></script>

</body>
</html>
